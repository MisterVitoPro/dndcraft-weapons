name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  chiseled-build:
    name: chiseledBuild (5 MC versions)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Loom launches a separate JVM per MC version. 1.20.1 needs JDK 17;
      # 1.21.x and 26.1.2 need JDK 21+. Install both so toolchain
      # auto-discovery finds them.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # The last setup-java sets JAVA_HOME to JDK 21 (correct for Gradle launch).
      # JDK 17 is still on disk for Gradle's toolchain auto-discovery.

      - name: Strip local JDK override from gradle.properties
        run: sed -i '/^org\.gradle\.java\.home=/d' gradle.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/caches/fabric-loom
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build all MC versions
        run: ./gradlew chiseledBuild --stacktrace --no-daemon

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: versions/*/build/libs/*.jar
          if-no-files-found: warn
          retention-days: 7

  chiseled-gametest:
    name: chiseledRunGametest (5 MC versions)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Gametests have known failures right now (see commit 26eccbb).
    # We still run them to catch regressions and to surface the
    # gametest-report.xml artifacts; non-zero exit does not fail the workflow.
    continue-on-error: true
    needs: chiseled-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Strip local JDK override from gradle.properties
        run: sed -i '/^org\.gradle\.java\.home=/d' gradle.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/caches/fabric-loom
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Run gametests on all MC versions
        run: ./gradlew chiseledRunGametest --stacktrace --no-daemon
        continue-on-error: true

      - name: Upload gametest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gametest-reports
          path: |
            versions/*/build/gametest-report.xml
            versions/*/build/gametest/logs/latest.log
          if-no-files-found: warn
          retention-days: 30

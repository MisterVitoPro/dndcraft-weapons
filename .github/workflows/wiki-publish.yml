name: Publish Wiki

# Phase 6 §7 spec: publish wiki on v* or phase-* tag push.
# P3-010 (QA Swarm 2026-05-18): the file was missing - this adds it.
on:
  push:
    tags:
      - 'v*'
      - 'phase-*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: generateWiki + publishWiki
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Strip local JDK override from gradle.properties
        run: sed -i '/^org\.gradle\.java\.home=/d' gradle.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/caches/fabric-loom
          key: gradle-${{ runner.os }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties', '**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # chiseledGenerateWiki wraps :1.21.4:generateWiki through the Stonecutter
      # source-processing pipeline (shared sources contain //? directives).
      # publishWiki then syncs build/wiki/ to <repo>.wiki.git.
      - name: Generate + publish wiki
        run: ./gradlew chiseledGenerateWiki :1.21.4:publishWiki --stacktrace --no-daemon
        env:
          WIKI_PUBLISH_TOKEN: ${{ secrets.WIKI_PUBLISH_TOKEN }}

      - name: Upload generated wiki artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiki
          path: versions/1.21.4/build/wiki/
          if-no-files-found: warn
          retention-days: 14

# .github/workflows/wiki-publish.yml
name: Publish Wiki

on:
  push:
    tags:
      - 'v*'
      - 'phase-*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Generate + publish wiki
        env:
          WIKI_PUBLISH_TOKEN: ${{ secrets.WIKI_PUBLISH_TOKEN }}
        run: ./gradlew :1.21.4:generateWiki publishWiki

      - name: Upload generated wiki as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-wiki
          path: 1.21.4/build/wiki/
          if-no-files-found: warn
          retention-days: 14
